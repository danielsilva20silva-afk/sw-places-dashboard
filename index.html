<!doctype html>
<html lang="pt">
  <head>
    <!-- Per-client branding is injected at build time by the client-branding Vite
         plugin (see vite.config.js), driven by src/config/<VITE_CLIENT>.js:
           - {{APP_TITLE}} / {{APP_APPLE_TITLE}} below
           - /manifest.json (generated: name / short_name / description / theme_color)
         Still SHARED across clients (TODO when brand assets exist): favicon.svg,
         apple-touch-icon.png, icon-192/512.png. -->
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <link rel="apple-touch-icon" href="/apple-touch-icon.png" />
    <link rel="manifest" href="/manifest.json" />
    <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, viewport-fit=cover" />
    <meta name="theme-color" content="#111111" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="{{APP_APPLE_TITLE}}" />
    <title>{{APP_TITLE}}</title>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
